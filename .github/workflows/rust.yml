name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            libpulse-dev \
            libwayland-dev \
            libinput-dev \
            libudev-dev \
            libseat-dev \
            libexpat1-dev

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Build
        run: cargo build --verbose

      - name: Check/sanitize
        run: just check

      - name: Run tests (applet + standalone)
        run: just test-matrix

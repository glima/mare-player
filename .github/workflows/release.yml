name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY: cosmic-applet-mare
  APP_ID: io.github.cosmic-applet-mare

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libdbus-1-dev \
            libsecret-1-dev \
            libxkbcommon-dev \
            libpulse-dev \
            libwayland-dev \
            libinput-dev \
            libudev-dev \
            libseat-dev \
            libexpat1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tools
        uses: cargo-bins/cargo-binstall@v1.15.0

      - run: cargo binstall --no-confirm just cargo-deb cargo-generate-rpm

      - name: Build release binary
        run: just build-release

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build .rpm package
        run: |
          strip -s target/release/${{ env.BINARY }}
          cargo generate-rpm

      - name: Prepare tarball
        run: |
          ARCH=$(uname -m)
          DIR=${{ env.BINARY }}
          mkdir -p "$DIR"
          cp target/release/${{ env.BINARY }} "$DIR/"
          cp resources/app.desktop "$DIR/${{ env.APP_ID }}.desktop"
          cp resources/app.metainfo.xml "$DIR/${{ env.APP_ID }}.metainfo.xml"
          cp resources/icon.svg "$DIR/${{ env.APP_ID }}.svg"
          cp LICENSE "$DIR/"
          strip -s "$DIR/${{ env.BINARY }}"
          tar -czvf "${{ env.BINARY }}-${ARCH}.tar.gz" "$DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}
          path: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
            ${{ env.BINARY }}-*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          shasum -a 256 *.deb *.rpm *.tar.gz > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            release/*.deb
            release/*.rpm
            release/*.tar.gz
            release/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
